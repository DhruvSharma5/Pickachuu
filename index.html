<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pokemon UI</title>

  <!-- GOOGLE FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sty.css">

</head>
<body>

  <div class="main">

    <div class="container">

      <!-- LEFT -->

      <div class="left">

        <img class="logo" src="./JGyfIw-pokemon-logo-png.png" alt="pokemon logo">

        <div class="content">

          <h4 class="small-heading">POKEMON GEN I</h4>

          <h1>Pikachu</h1>

          <p>
            Pikachu is an Electric-type Pokémon introduced in Generation I.
            Pikachu are small, chubby, and incredibly cute mouse-like Pokémon.
            They are almost completely covered by yellow fur.
          </p>

          <div class="bottom-text">
            <div class="line"></div>
            <h5>01 / 08</h5>
          </div>

        </div>

        <div class="circle"></div>

      </div>

      <!-- RIGHT -->

      <div class="right">

        <div class="menu">
          <div></div>
          <div></div>
          <div></div>
        </div>

        <img class="pikachu" src="./pickachu png.webp" alt="pikachu">

        <div class="dots">
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>

      </div>

    </div>

  </div>

</body>
</html>
